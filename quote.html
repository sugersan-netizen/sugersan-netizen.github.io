<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>見積書作成</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #1a1a2e;
      --accent: #4f8ef7;
      --border: #d0d5dd;
      --bg: #f5f7fa;
      --surface: #ffffff;
      --text: #1a1a2e;
      --muted: #667085;
      --danger: #e74c3c;
      --success: #27ae60;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Meiryo', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ====== SCREEN ONLY ====== */
    .screen-header {
      background: var(--primary);
      color: #fff;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .screen-header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .btn-group {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.5rem 1.2rem;
      border: none;
      border-radius: 4px;
      font-size: 0.82rem;
      font-family: inherit;
      cursor: pointer;
      font-weight: 500;
      transition: opacity 0.2s;
      letter-spacing: 0.03em;
    }

    .btn:hover { opacity: 0.85; }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: #fff; color: var(--primary); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-success { background: var(--success); color: #fff; }

    .container {
      max-width: 860px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    /* ====== QUOTE PAPER ====== */
    .quote-paper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3rem 3.5rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    /* Title */
    .quote-title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 2.5rem;
      gap: 2rem;
    }

    .doc-title {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--primary);
      border-bottom: 3px solid var(--primary);
      padding-bottom: 0.3rem;
    }

    .meta-block {
      text-align: right;
      font-size: 0.85rem;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .meta-block label {
      display: inline-block;
      min-width: 5rem;
      text-align: right;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .meta-input {
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 0.2rem 0.4rem;
      font-family: inherit;
      font-size: 0.85rem;
      color: var(--text);
      background: transparent;
      text-align: right;
      width: 140px;
    }

    .meta-input:focus { outline: none; border-bottom-color: var(--accent); }

    /* Parties */
    .parties {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-bottom: 2.5rem;
    }

    .party-block {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .party-label {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.3rem;
    }

    .party-input {
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 0.3rem 0.2rem;
      font-family: inherit;
      font-size: 0.9rem;
      color: var(--text);
      background: transparent;
      width: 100%;
    }

    .party-input:focus { outline: none; border-bottom-color: var(--accent); }
    .party-input.name-input { font-size: 1.1rem; font-weight: 600; }

    .client-honorific {
      font-size: 1.1rem;
      font-weight: 600;
      display: flex;
      align-items: baseline;
      gap: 0.3rem;
    }

    .honorific-suffix {
      font-size: 0.9rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* Subject */
    .subject-row {
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .subject-row .field-label {
      font-size: 0.85rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .subject-input {
      flex: 1;
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 0.3rem 0.4rem;
      font-family: inherit;
      font-size: 0.95rem;
      color: var(--text);
      background: transparent;
    }

    .subject-input:focus { outline: none; border-bottom-color: var(--accent); }

    /* Items Table */
    .items-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 0.5rem;
      font-size: 0.88rem;
    }

    .items-table thead th {
      background: var(--primary);
      color: #fff;
      padding: 0.6rem 0.5rem;
      text-align: center;
      font-weight: 500;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
    }

    .items-table thead th:first-child { text-align: left; border-radius: 2px 0 0 0; }
    .items-table thead th:last-child { border-radius: 0 2px 0 0; }

    .items-table tbody tr:nth-child(even) { background: #f8f9fc; }
    .items-table tbody tr:hover { background: #eef3ff; }

    .items-table td {
      padding: 0.3rem 0.4rem;
      border-bottom: 1px solid #eee;
      vertical-align: middle;
    }

    .item-input {
      border: none;
      background: transparent;
      width: 100%;
      font-family: inherit;
      font-size: 0.88rem;
      color: var(--text);
      padding: 0.2rem;
    }

    .item-input:focus { outline: 1px solid var(--accent); border-radius: 2px; background: #fff; }

    .item-input.num { text-align: right; }

    td.amount-cell {
      text-align: right;
      font-variant-numeric: tabular-nums;
      padding-right: 0.6rem;
      white-space: nowrap;
      color: var(--text);
    }

    td.del-cell {
      text-align: center;
      width: 32px;
    }

    .del-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 1rem;
      line-height: 1;
      padding: 0 4px;
      border-radius: 2px;
      transition: color 0.2s;
    }
    .del-btn:hover { color: var(--danger); }

    /* Add row */
    .add-row-btn {
      margin-top: 0.5rem;
      background: none;
      border: 1px dashed var(--border);
      border-radius: 3px;
      padding: 0.4rem 1rem;
      font-family: inherit;
      font-size: 0.82rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }
    .add-row-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Totals */
    .totals-section {
      display: flex;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }

    .totals-table {
      width: 280px;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    .totals-table td {
      padding: 0.45rem 0.6rem;
      border-bottom: 1px solid #eee;
    }

    .totals-table td:last-child {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .totals-table .tax-row td { color: var(--muted); }

    .totals-table .tax-select {
      border: none;
      border-bottom: 1px solid var(--border);
      font-family: inherit;
      font-size: 0.82rem;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
    }

    .totals-table .grand-total td {
      font-weight: 700;
      font-size: 1rem;
      border-top: 2px solid var(--primary);
      border-bottom: 2px solid var(--primary);
      background: #f0f4ff;
    }

    /* Notes */
    .notes-section {
      margin-top: 2rem;
    }

    .notes-label {
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-bottom: 0.4rem;
    }

    .notes-input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.6rem 0.8rem;
      font-family: inherit;
      font-size: 0.85rem;
      color: var(--text);
      resize: vertical;
      min-height: 70px;
    }

    .notes-input:focus { outline: none; border-color: var(--accent); }

    /* Validity notice */
    .validity-row {
      margin-top: 1.5rem;
      font-size: 0.82rem;
      color: var(--muted);
      text-align: center;
    }

    /* ====== PRINT ====== */
    @media print {
      body { background: #fff; font-size: 12px; }
      .screen-header, .btn-group, .add-row-btn, .del-btn, .del-cell { display: none !important; }
      .container { margin: 0; padding: 0; max-width: 100%; }
      .quote-paper { border: none; box-shadow: none; padding: 1.5cm 2cm; border-radius: 0; }
      .item-input, .party-input, .meta-input, .subject-input, .notes-input {
        border: none !important;
        background: transparent !important;
        outline: none !important;
      }
      .tax-select { border: none !important; }
      .items-table tbody tr:nth-child(even) { background: #f8f8f8 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .items-table thead { background: #1a1a2e !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .totals-table .grand-total td { background: #f0f4ff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      @page { size: A4; margin: 0; }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .quote-paper { padding: 1.5rem 1rem; }
      .parties { grid-template-columns: 1fr; }
      .quote-title-row { flex-direction: column; gap: 1rem; }
      .meta-block { text-align: left; }
      .totals-section { justify-content: stretch; }
      .totals-table { width: 100%; }
    }
  </style>
</head>
<body>

<header class="screen-header">
  <h1>見積書作成ツール</h1>
  <div class="btn-group">
    <button class="btn btn-secondary" onclick="clearAll()">クリア</button>
    <button class="btn btn-primary" onclick="window.print()">印刷 / PDF保存</button>
  </div>
</header>

<div class="container">
  <div class="quote-paper" id="quotePaper">

    <!-- Title & Meta -->
    <div class="quote-title-row">
      <div class="doc-title">見 積 書</div>
      <div class="meta-block">
        <div>
          <label>見積番号</label>
          <input class="meta-input" id="quoteNum" type="text" value="Q-001" />
        </div>
        <div>
          <label>発行日</label>
          <input class="meta-input" id="issueDate" type="date" />
        </div>
        <div>
          <label>有効期限</label>
          <input class="meta-input" id="expDate" type="date" />
        </div>
      </div>
    </div>

    <!-- Client & Issuer -->
    <div class="parties">
      <!-- Client -->
      <div class="party-block">
        <div class="party-label">お客様</div>
        <div class="client-honorific">
          <input class="party-input name-input" id="clientName" type="text" placeholder="株式会社○○" />
          <span class="honorific-suffix">御中</span>
        </div>
        <input class="party-input" id="clientDept" type="text" placeholder="担当部署（任意）" />
        <input class="party-input" id="clientContact" type="text" placeholder="担当者名（任意）" />
      </div>
      <!-- Issuer -->
      <div class="party-block">
        <div class="party-label">発行者</div>
        <input class="party-input name-input" id="issuerName" type="text" placeholder="会社名 / 氏名" />
        <input class="party-input" id="issuerAddress" type="text" placeholder="住所" />
        <input class="party-input" id="issuerTel" type="text" placeholder="TEL" />
        <input class="party-input" id="issuerEmail" type="text" placeholder="Email" />
        <input class="party-input" id="issuerReg" type="text" placeholder="登録番号（インボイス）" />
      </div>
    </div>

    <!-- Subject -->
    <div class="subject-row">
      <span class="field-label">件名：</span>
      <input class="subject-input" id="subject" type="text" placeholder="ご提案内容・件名をご入力ください" />
    </div>

    <!-- Items -->
    <table class="items-table" id="itemsTable">
      <thead>
        <tr>
          <th style="width:38%">品名・内容</th>
          <th style="width:18%">数量</th>
          <th style="width:15%">単位</th>
          <th style="width:18%">単価（円）</th>
          <th style="width:16%">金額（円）</th>
          <th class="del-cell"></th>
        </tr>
      </thead>
      <tbody id="itemsBody"></tbody>
    </table>

    <button class="add-row-btn" onclick="addRow()">＋ 行を追加</button>

    <!-- Totals -->
    <div class="totals-section">
      <table class="totals-table">
        <tr>
          <td>小計</td>
          <td id="subtotalDisplay">¥0</td>
        </tr>
        <tr class="tax-row">
          <td>
            消費税
            <select class="tax-select" id="taxRate" onchange="recalc()">
              <option value="0.10" selected>10%</option>
              <option value="0.08">8%（軽減）</option>
              <option value="0">非課税</option>
            </select>
          </td>
          <td id="taxDisplay">¥0</td>
        </tr>
        <tr class="grand-total">
          <td>合計（税込）</td>
          <td id="totalDisplay">¥0</td>
        </tr>
      </table>
    </div>

    <!-- Notes -->
    <div class="notes-section">
      <div class="notes-label">備考</div>
      <textarea class="notes-input" id="notes" placeholder="お支払条件、納期、その他のご案内など"></textarea>
    </div>

    <div class="validity-row" id="validityText"></div>

  </div>
</div>

<script>
  // ---- Init ----
  const today = new Date();
  const fmt = d => d.toISOString().split('T')[0];
  const exp = new Date(today); exp.setDate(exp.getDate() + 30);

  document.getElementById('issueDate').value = fmt(today);
  document.getElementById('expDate').value = fmt(exp);

  document.getElementById('expDate').addEventListener('change', updateValidity);
  updateValidity();

  // Start with 5 empty rows
  for (let i = 0; i < 5; i++) addRow();
  recalc();

  // ---- Row management ----
  let rowId = 0;

  function addRow() {
    const id = rowId++;
    const tbody = document.getElementById('itemsBody');
    const tr = document.createElement('tr');
    tr.id = 'row-' + id;
    tr.innerHTML = `
      <td><input class="item-input" type="text" placeholder="品名・サービス内容" /></td>
      <td><input class="item-input num qty" type="number" min="0" step="any" value="1" oninput="recalc()" /></td>
      <td><input class="item-input" type="text" placeholder="式" /></td>
      <td><input class="item-input num price" type="number" min="0" step="any" value="" placeholder="0" oninput="recalc()" /></td>
      <td class="amount-cell" id="amt-${id}">—</td>
      <td class="del-cell"><button class="del-btn" onclick="delRow(${id})" title="削除">✕</button></td>
    `;
    tbody.appendChild(tr);
    recalc();
  }

  function delRow(id) {
    const row = document.getElementById('row-' + id);
    if (row) row.remove();
    recalc();
  }

  // ---- Calculation ----
  function recalc() {
    let subtotal = 0;
    document.querySelectorAll('#itemsBody tr').forEach(tr => {
      const qty = parseFloat(tr.querySelector('.qty')?.value) || 0;
      const price = parseFloat(tr.querySelector('.price')?.value) || 0;
      const amt = qty * price;
      const id = tr.id.replace('row-', '');
      const amtCell = document.getElementById('amt-' + id);
      if (amtCell) amtCell.textContent = amt ? fmt_yen(amt) : '—';
      subtotal += amt;
    });

    const taxRate = parseFloat(document.getElementById('taxRate').value);
    const tax = Math.floor(subtotal * taxRate);
    const total = subtotal + tax;

    document.getElementById('subtotalDisplay').textContent = fmt_yen(subtotal);
    document.getElementById('taxDisplay').textContent = fmt_yen(tax);
    document.getElementById('totalDisplay').textContent = fmt_yen(total);
  }

  function fmt_yen(n) {
    return '¥' + Math.round(n).toLocaleString('ja-JP');
  }

  // ---- Validity ----
  function updateValidity() {
    const expVal = document.getElementById('expDate').value;
    const el = document.getElementById('validityText');
    if (expVal) {
      const d = new Date(expVal);
      const label = d.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric' });
      el.textContent = `本見積書の有効期限は ${label} までとなります。`;
    } else {
      el.textContent = '';
    }
  }

  // ---- Clear ----
  function clearAll() {
    if (!confirm('内容をすべてクリアしますか？')) return;
    ['clientName','clientDept','clientContact','issuerName','issuerAddress',
     'issuerTel','issuerEmail','issuerReg','subject','notes'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('quoteNum').value = 'Q-001';
    document.getElementById('issueDate').value = fmt(new Date());
    const e = new Date(); e.setDate(e.getDate() + 30);
    document.getElementById('expDate').value = fmt(e);
    document.getElementById('taxRate').value = '0.10';
    document.getElementById('itemsBody').innerHTML = '';
    rowId = 0;
    for (let i = 0; i < 5; i++) addRow();
    recalc();
    updateValidity();
  }
</script>
</body>
</html>
